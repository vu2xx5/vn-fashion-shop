# Alembic Configuration - VN Fashion Shop
# =========================================

[alembic]
# Duong dan toi thu muc migration scripts
script_location = alembic

# Template cho file migration moi
file_template = %%(rev)s_%%(slug)s

# Timezone cho auto-generate
timezone = UTC

# Prepend sys.path (de import app.*)
prepend_sys_path = .

# Database URL - se bi ghi de boi env.py (doc tu Settings)
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Hook format code sau khi tao migration (tuy chon)
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
