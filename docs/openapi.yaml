      security: []
      operationId: stripeWebhook
      description: |
        Xu ly cac su kien tu Stripe:
        - payment_intent.succeeded
        - payment_intent.payment_failed
        - charge.refunded
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Stripe event payload
      responses:
        "200":
          description: Webhook processed
          content:
